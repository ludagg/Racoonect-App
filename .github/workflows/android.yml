name: Build Android

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK Android
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      # Génère un keystore temporaire à la volée — aucun secret nécessaire
      - name: Generate ephemeral keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore android/app/release.keystore \
            -alias release \
            -keyalg RSA \
            -keysize 2048 \
            -validity 1 \
            -storepass temppassword \
            -keypass temppassword \
            -dname "CN=CI, OU=CI, O=CI, L=CI, S=CI, C=FR"

      # Injecte la config de signature dans gradle
      - name: Configure signing
        run: |
          cat >> android/app/build.gradle << 'EOF'

          android.signingConfigs {
            release {
              storeFile file("release.keystore")
              storePassword "temppassword"
              keyAlias "release"
              keyPassword "temppassword"
            }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF

      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7